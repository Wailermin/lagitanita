<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Menú</title>

  <style>
    .PreviewPane,
    [data-testid="preview-pane"]{
      display: none !important;
    }
    .EditorContainer,
    [data-testid="editor-container"]{
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* fondo general */
body {
  background: linear-gradient(180deg,#070708,#0b0b0c 40%,#080809);
}

/* tarjetas de secciones */
.css-1f3mf5k, 
.css-1f3mf5k > div {
  background:#141418 !important;
  border-radius:14px !important;
  border:1px solid #242430 !important;
}

/* títulos de sección */
.css-1f3mf5k label {
  font-weight:600 !important;
  letter-spacing:.5px;
}

/* barra superior */
.css-1q1n0ol {
  background:#111 !important;
  border-bottom:1px solid #242430 !important;
}

/* botones */
button {
  border-radius:10px !important;
}

/* botón publish */
button.css-1d391kg {
  background:#2abfbf !important;
  color:#071012 !important;
}

/* inputs */
input, textarea {
  background:#0f0f12 !important;
  border:1px solid #2a2a35 !important;
  color:white !important;
}

.wailer-brand{
  position:fixed;
  bottom:12px;
  right:18px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
  z-index:9999;
}

.wailer-brand strong{
  color:#2abfbf;
}

/* ===== WAILER BRAND HEADER ===== */

.wailer-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0b0b0c;
  border-bottom:1px solid #242430;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:9999;
}

.wailer-logo{
  font-weight:800;
  letter-spacing:2px;
  font-size:16px;
  color:#2abfbf;
}

.wailer-sub{
  margin-left:10px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
}

/* mover contenido del CMS hacia abajo */
#nc-root{
  margin-top:70px;
}

/* ================================
   DECAP CMS — LIGHT PREMIUM (WAILER)
   ================================ */

/* Fondo del admin (afuera) suave, no negro pesado */
body{
  background: #f4f6fb !important;
}

/* El área del CMS */
#nc-root{
  background: transparent !important;
}

/* Header Wailer que combine con el claro */
.wailer-header{
  background:#0b0b0c;
  border-bottom:1px solid rgba(255,255,255,.10);
}

/* “Tarjetas” y paneles del CMS: más premium */
#nc-root [class*="Card"],
#nc-root [class*="card"],
#nc-root [class*="Pane"],
#nc-root [class*="pane"],
#nc-root [class*="ListCard"],
#nc-root [class*="listCard"],
#nc-root [class*="Control"],
#nc-root [class*="control"],
#nc-root [class*="Widget"],
#nc-root [class*="widget"],
#nc-root fieldset{
  border-radius: 16px !important;
  border: 1px solid rgba(20,20,24,.10) !important;
  box-shadow: 0 10px 25px rgba(12,18,28,.08) !important;
}

/* Inputs más suaves */
#nc-root input,
#nc-root textarea,
#nc-root select{
  border-radius: 12px !important;
}

/* Focus turquesa (tu marca) */
#nc-root input:focus,
#nc-root textarea:focus,
#nc-root select:focus{
  border-color: rgba(42,191,191,.85) !important;
  box-shadow: 0 0 0 3px rgba(42,191,191,.18) !important;
  outline: none !important;
}

/* Botón primario (Publish) con tu color */
#nc-root button[class*="Primary"],
#nc-root button[class*="primary"]{
  background:#2abfbf !important;
  color:#071012 !important;
  border:none !important;
  border-radius: 12px !important;
  font-weight: 700 !important;
}

/* Footer Powered by Wailer que combine */
.wailer-brand{
  color: rgba(0,0,0,.45);
}
.wailer-brand strong{
  color:#2abfbf;
}

  </style>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <div class="wailer-header">
  <div class="wailer-logo">⚡ WAILER</div>
  <div class="wailer-sub">Restaurant CMS</div>
</div>

  <div class="wailer-brand">
  Powered by <strong>Wailer</strong>
</div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>

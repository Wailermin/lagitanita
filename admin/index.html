<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Menú</title>

  <style>
    .PreviewPane,
    [data-testid="preview-pane"]{
      display: none !important;
    }
    .EditorContainer,
    [data-testid="editor-container"]{
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* fondo general */
body {
  background: linear-gradient(180deg,#070708,#0b0b0c 40%,#080809);
}

/* tarjetas de secciones */
.css-1f3mf5k, 
.css-1f3mf5k > div {
  background:#141418 !important;
  border-radius:14px !important;
  border:1px solid #242430 !important;
}

/* títulos de sección */
.css-1f3mf5k label {
  font-weight:600 !important;
  letter-spacing:.5px;
}

/* barra superior */
.css-1q1n0ol {
  background:#111 !important;
  border-bottom:1px solid #242430 !important;
}

/* botones */
button {
  border-radius:10px !important;
}

/* botón publish */
button.css-1d391kg {
  background:#2abfbf !important;
  color:#071012 !important;
}

/* inputs */
input, textarea {
  background:#0f0f12 !important;
  border:1px solid #2a2a35 !important;
  color:white !important;
}

.wailer-brand{
  position:fixed;
  bottom:12px;
  right:18px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
  z-index:9999;
}

.wailer-brand strong{
  color:#2abfbf;
}

/* ===== WAILER BRAND HEADER ===== */

.wailer-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0b0b0c;
  border-bottom:1px solid #242430;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:9999;
}

.wailer-logo{
  font-weight:800;
  letter-spacing:2px;
  font-size:16px;
  color:#2abfbf;
}

.wailer-sub{
  margin-left:10px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
}

/* mover contenido del CMS hacia abajo */
#nc-root{
  margin-top:70px;
}
  </style>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <div class="wailer-header">
  <div class="wailer-logo">⚡ WAILER</div>
  <div class="wailer-sub">Restaurant CMS</div>
</div>

  <div class="wailer-brand">
  Powered by <strong>Wailer</strong>
</div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Menú</title>

  <style>
    .PreviewPane,
    [data-testid="preview-pane"]{
      display: none !important;
    }
    .EditorContainer,
    [data-testid="editor-container"]{
      width: 100% !important;
      max-width: 100% !important;
    }
    
    /* fondo general */
body {
  background: linear-gradient(180deg,#070708,#0b0b0c 40%,#080809);
}

/* tarjetas de secciones */
.css-1f3mf5k, 
.css-1f3mf5k > div {
  background:#141418 !important;
  border-radius:14px !important;
  border:1px solid #242430 !important;
}

/* títulos de sección */
.css-1f3mf5k label {
  font-weight:600 !important;
  letter-spacing:.5px;
}

/* barra superior */
.css-1q1n0ol {
  background:#111 !important;
  border-bottom:1px solid #242430 !important;
}

/* botones */
button {
  border-radius:10px !important;
}

/* botón publish */
button.css-1d391kg {
  background:#2abfbf !important;
  color:#071012 !important;
}

/* inputs */
input, textarea {
  background:#0f0f12 !important;
  border:1px solid #2a2a35 !important;
  color:white !important;
}

.wailer-brand{
  position:fixed;
  bottom:12px;
  right:18px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
  z-index:9999;
}

.wailer-brand strong{
  color:#2abfbf;
}

/* ===== WAILER BRAND HEADER ===== */

.wailer-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0b0b0c;
  border-bottom:1px solid #242430;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:9999;
}

.wailer-logo{
  font-weight:800;
  letter-spacing:2px;
  font-size:16px;
  color:#2abfbf;
}

.wailer-sub{
  margin-left:10px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
}

/* mover contenido del CMS hacia abajo */
#nc-root{
  margin-top:70px;
}
/* ================================
   DECAP CMS — DARK THEME (WAILER)
   ================================ */

#nc-root{
  --w-bg:#0b0b0c;
  --w-panel:#141418;
  --w-panel2:#101014;
  --w-line:#242430;
  --w-text:#ffffff;
  --w-muted:rgba(255,255,255,.72);
  --w-accent:#2abfbf;
}

/* Fondo de toda el área interna del CMS */
#nc-root,
#nc-root > div{
  background: var(--w-bg) !important;
  color: var(--w-text) !important;
}

/* Sidebar + área central (colecciones / listas / editor) */
#nc-root [class*="Sidebar"],
#nc-root [class*="sidebar"],
#nc-root [class*="Collection"],
#nc-root [class*="collection"],
#nc-root [class*="Page"],
#nc-root [class*="page"],
#nc-root [class*="Content"],
#nc-root [class*="content"]{
  background: transparent !important;
  color: var(--w-text) !important;
}

/* Tarjetas / paneles */
#nc-root [class*="Card"],
#nc-root [class*="card"],
#nc-root [class*="Pane"],
#nc-root [class*="pane"],
#nc-root [class*="List"],
#nc-root [class*="list"],
#nc-root [class*="Control"],
#nc-root [class*="control"],
#nc-root [class*="Widget"],
#nc-root [class*="widget"]{
  background: var(--w-panel) !important;
  border: 1px solid var(--w-line) !important;
  border-radius: 16px !important;
  color: var(--w-text) !important;
}

/* “Bloques” internos del editor (secciones tipo Desayuno/Entradas/etc.) */
#nc-root details,
#nc-root summary,
#nc-root fieldset{
  background: var(--w-panel) !important;
  border: 1px solid var(--w-line) !important;
  border-radius: 16px !important;
  color: var(--w-text) !important;
}

/* Textos secundarios */
#nc-root p,
#nc-root small,
#nc-root label,
#nc-root [class*="hint"],
#nc-root [class*="Help"],
#nc-root [class*="help"]{
  color: var(--w-muted) !important;
}

/* Inputs */
#nc-root input,
#nc-root textarea,
#nc-root select{
  background: var(--w-panel2) !important;
  border: 1px solid #2a2a35 !important;
  color: var(--w-text) !important;
  border-radius: 12px !important;
  outline: none !important;
}

#nc-root input:focus,
#nc-root textarea:focus,
#nc-root select:focus{
  border-color: rgba(42,191,191,.75) !important;
  box-shadow: 0 0 0 3px rgba(42,191,191,.18) !important;
}

/* Botones */
#nc-root button{
  border-radius: 12px !important;
}

/* Botón primario (Publish/Guardar) — lo resaltamos */
#nc-root button[class*="Primary"],
#nc-root button[class*="primary"]{
  background: var(--w-accent) !important;
  color: #071012 !important;
  border: none !important;
}

/* Links / estados activos */
#nc-root a,
#nc-root [class*="active"]{
  color: var(--w-accent) !important;
}

/* Quitar blancos fuertes que “rompen” el dark */
#nc-root [style*="background: rgb(255, 255, 255)"],
#nc-root [style*="background:#fff"],
#nc-root [style*="background: #fff"]{
  background: var(--w-panel) !important;
}
  </style>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <div class="wailer-header">
  <div class="wailer-logo">⚡ WAILER</div>
  <div class="wailer-sub">Restaurant CMS</div>
</div>

  <div class="wailer-brand">
  Powered by <strong>Wailer</strong>
</div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>

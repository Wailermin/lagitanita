<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Menú</title>

  <style>
    .PreviewPane,
    [data-testid="preview-pane"]{
      display: none !important;
    }
    .EditorContainer,
    [data-testid="editor-container"]{
      width: 100% !important;
      max-width: 100% !important;
    }

.wailer-brand{
  position:fixed;
  bottom:12px;
  right:18px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
  z-index:9999;
}

.wailer-brand strong{
  color:#2abfbf;
}

/* ===== WAILER BRAND HEADER ===== */

.wailer-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0b0b0c;
  border-bottom:1px solid #242430;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:9999;
}

.wailer-logo{
  font-weight:800;
  letter-spacing:2px;
  font-size:16px;
  color:#2abfbf;
}

.wailer-sub{
  margin-left:10px;
  font-size:12px;
  color:#aaa;
  letter-spacing:1px;
}
/* Footer Powered by Wailer que combine */
.wailer-brand{
  color: rgba(0,0,0,.45);
}
.wailer-brand strong{
  color:#2abfbf;
}

  </style>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <div class="wailer-header">
  <div class="wailer-logo">⚡ WAILER</div>
  <div class="wailer-sub">Restaurant CMS</div>
</div>

  <div class="wailer-brand">
  Powered by <strong>Wailer</strong>
</div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
